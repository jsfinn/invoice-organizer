name: InvoiceOrganizer
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: 14.0

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0

targets:
  InvoiceOrganizer:
    type: application
    platform: macOS
    sources:
      - path: Sources/InvoiceOrganizer
        excludes:
          - Resources/AppIcon.iconset
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pkm.invoiceorganizer
        PRODUCT_NAME: Invoice Organizer
        PRODUCT_MODULE_NAME: InvoiceOrganizer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/InvoiceOrganizer/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.3
        CODE_SIGNING_ALLOWED: NO
    scheme:
      testTargets:
        - InvoiceOrganizerTests

  InvoiceOrganizerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/InvoiceOrganizerTests
    dependencies:
      - target: InvoiceOrganizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pkm.invoiceorganizer.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Invoice Organizer.app/Contents/MacOS/Invoice Organizer"
        BUNDLE_LOADER: "$(TEST_HOST)"
