name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify committed project version
        run: |
          project_version="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("project.yml").read_text()
          match = re.search(r'(^\s*MARKETING_VERSION:\s*)(\d+\.\d+\.\d+)\s*$', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read MARKETING_VERSION from project.yml")

          print(match.group(2))
          PY
          )"
          if [[ "${project_version}" != "${{ steps.version.outputs.value }}" ]]; then
            echo "Tag version ${GITHUB_REF_NAME#v} does not match project.yml MARKETING_VERSION ${project_version}" >&2
            exit 1
          fi

      - name: Read build number
        id: build
        run: |
          build_number="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("project.yml").read_text()
          match = re.search(r'(^\s*CURRENT_PROJECT_VERSION:\s*)(\d+)\s*$', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read CURRENT_PROJECT_VERSION from project.yml")

          print(match.group(2))
          PY
          )"
          echo "value=${build_number}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.value }}
          PERSIST_VERSION: "0"
        run: |
          chmod +x ./make-dmg.sh
          ./make-dmg.sh

      - name: Prepare appcast from release branch
        run: |
          git fetch origin release
          git worktree add -B release-sync /tmp/release-worktree origin/release
          cp /tmp/release-worktree/appcast.xml appcast.xml

      - name: Sign DMG and update appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SIGN_UPDATE: build/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update
        run: |
          dmg_file="$(ls dist/*.dmg | head -1)"
          version="${{ steps.version.outputs.value }}"
          build="${{ steps.build.outputs.value }}"
          download_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "${dmg_file}")"
          chmod +x ./update-appcast.sh
          ./update-appcast.sh "${dmg_file}" "${version}" "${build}" "${download_url}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.0
        with:
          name: Invoice Organizer ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.dmg
          fail_on_unmatched_files: true

      - name: Push appcast to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp appcast.xml /tmp/release-worktree/appcast.xml
          cd /tmp/release-worktree
          git add appcast.xml
          git commit -m "Update appcast for ${{ github.ref_name }}"
          git push origin HEAD:release
