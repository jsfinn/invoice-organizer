name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to embed in the app and DMG filename
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build DMG
        env:
          VERSION: ${{ inputs.version }}
          PERSIST_VERSION: "0"
        run: |
          chmod +x ./make-dmg.sh
          ./make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceOrganizer-${{ inputs.version }}
          path: dist/*.dmg
          if-no-files-found: error
