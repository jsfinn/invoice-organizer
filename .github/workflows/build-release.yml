name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify committed project version
        run: |
          project_version="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("project.yml").read_text()
          match = re.search(r'(^\s*MARKETING_VERSION:\s*)(\d+\.\d+\.\d+)\s*$', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read MARKETING_VERSION from project.yml")

          print(match.group(2))
          PY
          )"
          if [[ "${project_version}" != "${{ steps.version.outputs.value }}" ]]; then
            echo "Tag version ${GITHUB_REF_NAME#v} does not match project.yml MARKETING_VERSION ${project_version}" >&2
            exit 1
          fi

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.value }}
          PERSIST_VERSION: "0"
        run: |
          chmod +x ./make-dmg.sh
          ./make-dmg.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.0
        with:
          name: Invoice Organizer ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.dmg
          fail_on_unmatched_files: true
