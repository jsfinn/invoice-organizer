name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        id: signing
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          BUILD_KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/build.keychain-db"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_data = base64.b64decode(os.environ["DEVELOPER_ID_P12_BASE64"])
          Path(os.environ["RUNNER_TEMP"], "developer-id.p12").write_bytes(cert_data)
          PY

          security create-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$DEVELOPER_ID_P12_PASSWORD" -f pkcs12 -A
          existing_keychains=()
          while IFS= read -r keychain; do
            keychain="${keychain//\"/}"
            if [[ -n "${keychain}" ]]; then
              existing_keychains+=("${keychain}")
            fi
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$keychain_path" "${existing_keychains[@]}"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -k "$BUILD_KEYCHAIN_PASSWORD" "$keychain_path"

          identity="$(security find-identity -v -p codesigning 2>&1 | python3 -c 'import re, sys; data = sys.stdin.read(); match = re.search(r"\"(Developer ID Application:[^\"]+)\"", data); print(match.group(1) if match else "")')"
          if [[ -z "${identity}" ]]; then
            echo "Could not find a Developer ID Application identity in the imported certificate." >&2
            exit 1
          fi

          team_id="$(python3 -c 'import re, sys; m = re.search(r"\(([A-Z0-9]+)\)$", sys.argv[1]); print(m.group(1) if m else "")' "${identity}")"
          if [[ -z "${team_id}" ]]; then
            echo "Could not derive the team ID from signing identity: ${identity}" >&2
            exit 1
          fi

          {
            printf 'identity=%s\n' "${identity}"
            printf 'team_id=%s\n' "${team_id}"
            printf 'keychain_path=%s\n' "${keychain_path}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare notarization API key
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_data = base64.b64decode(os.environ["APPLE_API_KEY_P8_BASE64"])
          Path(os.environ["RUNNER_TEMP"], f"AuthKey_{os.environ['APPLE_KEY_ID']}.p8").write_bytes(key_data)
          PY

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify committed project version
        run: |
          project_version="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("project.yml").read_text()
          match = re.search(r'(^\s*MARKETING_VERSION:\s*)(\d+\.\d+\.\d+)\s*$', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read MARKETING_VERSION from project.yml")

          print(match.group(2))
          PY
          )"
          if [[ "${project_version}" != "${{ steps.version.outputs.value }}" ]]; then
            echo "Tag version ${GITHUB_REF_NAME#v} does not match project.yml MARKETING_VERSION ${project_version}" >&2
            exit 1
          fi

      - name: Read build number
        id: build
        run: |
          build_number="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("project.yml").read_text()
          match = re.search(r'(^\s*CURRENT_PROJECT_VERSION:\s*)(\d+)\s*$', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read CURRENT_PROJECT_VERSION from project.yml")

          print(match.group(2))
          PY
          )"
          echo "value=${build_number}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.value }}
          PERSIST_VERSION: "0"
          XCODE_CODE_SIGNING_ALLOWED: "YES"
          XCODE_CODE_SIGN_STYLE: "Manual"
          XCODE_CODE_SIGN_IDENTITY: ${{ steps.signing.outputs.identity }}
          XCODE_DEVELOPMENT_TEAM: ${{ steps.signing.outputs.team_id }}
          XCODE_OTHER_CODE_SIGN_FLAGS: --keychain ${{ steps.signing.outputs.keychain_path }}
          XCODE_ENABLE_HARDENED_RUNTIME: "YES"
        run: |
          chmod +x ./make-dmg.sh
          ./make-dmg.sh

      - name: Verify app signature
        run: |
          codesign --verify --deep --strict --verbose=2 "build/Build/Products/Release/Invoice Organizer.app"

      - name: Sign DMG
        env:
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          KEYCHAIN_PATH: ${{ steps.signing.outputs.keychain_path }}
        run: |
          dmg_file="$(ls dist/*.dmg | head -1)"
          codesign --force --sign "${SIGNING_IDENTITY}" --keychain "${KEYCHAIN_PATH}" --timestamp "${dmg_file}"
          codesign --verify --verbose=2 "${dmg_file}"

      - name: Notarize and staple DMG
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          dmg_file="$(ls dist/*.dmg | head -1)"
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_KEY_ID}.p8"

          submission_output="$(xcrun notarytool submit "${dmg_file}" --key "${api_key_path}" --key-id "${APPLE_KEY_ID}" --issuer "${APPLE_ISSUER_ID}" --wait 2>&1)"
          echo "${submission_output}"

          submission_id="$(echo "${submission_output}" | python3 -c 'import re, sys; m = re.search(r"id: ([0-9a-f-]+)", sys.stdin.read()); print(m.group(1) if m else "")')"

          if echo "${submission_output}" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching rejection log..."
            xcrun notarytool log "${submission_id}" --key "${api_key_path}" --key-id "${APPLE_KEY_ID}" --issuer "${APPLE_ISSUER_ID}" || true
            exit 1
          fi

          xcrun stapler staple "${dmg_file}"
          xcrun stapler validate "${dmg_file}"

      - name: Prepare appcast from release branch
        run: |
          git fetch origin release
          git worktree add -B release-sync /tmp/release-worktree origin/release
          cp /tmp/release-worktree/appcast.xml appcast.xml

      - name: Sign DMG and update appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SIGN_UPDATE: build/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update
        run: |
          dmg_file="$(ls dist/*.dmg | head -1)"
          version="${{ steps.version.outputs.value }}"
          build="${{ steps.build.outputs.value }}"
          download_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "${dmg_file}")"
          chmod +x ./update-appcast.sh
          ./update-appcast.sh "${dmg_file}" "${version}" "${build}" "${download_url}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.0
        with:
          name: Invoice Organizer ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.dmg
          fail_on_unmatched_files: true

      - name: Push appcast to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp appcast.xml /tmp/release-worktree/appcast.xml
          cd /tmp/release-worktree
          git add appcast.xml
          git commit -m "Update appcast for ${{ github.ref_name }}"
          git push origin HEAD:release
